<!DOCTYPE html>
<html>
    <title> </title>
<style>
    body {
        font-family: Arial, sans-serif;
        background-color: #eef5f7;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        margin: 0;
    }

    form {
        background-color: #ffffff;
        padding: 35px;
        width: 450px;
        border-radius: 10px;

        /* clean hospital look */
        border: 2px solid #bcd4e6;
        box-shadow: 0 4px 10px rgba(0,0,0,0.1);

        text-align: center;
    }

    h1 {
        font-size: 28px;
        color: #2c3e50;
        margin-bottom: 20px;
    }

    p {
        font-size: 20px;
        color: #444;
        margin-bottom: 25px;
    }

    input[type="submit"] {
        width: 60%;
        padding: 12px;
        font-size: 20px;

        background-color: #e74c3c;
        color: white;

        border: none;
        border-radius: 6px;
        cursor: pointer;
    }

    input[type="submit"]:hover {
        background-color: #c0392b;
    }
</style>
    <body>
        <form action="" method="POST">
            {%csrf_token%}
        <h1>DELETE PATIENT RECORD</h1>
        <label for="">
            <p>
    Please confirm to delete this patient:<br><br>
    <b>ID:</b> {{ patient.pid }} <br><br>
    <b>Name:</b> {{ patient.pname }} <br><br>
    <b>Disease:</b> {{patient.pdisease }}
</p>
        </label><br><br>
        <input type="submit" value="delete">
        </form>
    </body>    
</html>
