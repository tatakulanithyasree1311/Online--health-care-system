<!DOCTYPE html>
<html>
<head>
    <title>Doctor</title>

<style>
    body {
        margin: 0;
        font-family: Arial;
        height: 100vh;

        /* ✅ SAME background as options */
        background-image: url('https://i.pinimg.com/736x/96/42/75/964275cb1d3387ca39de50cb7a40f230.jpg');
        background-size: cover;
        background-position: center;
        background-repeat: no-repeat;
        background-attachment: fixed;
    }

    /* 🔥 Dark overlay */
    body::before {
        content: "";
        position: fixed;
        width: 100%;
        height: 100%;
        background: rgba(0,0,0,0.4);
        top: 0;
        left: 0;
        z-index: -1;
    }

    /* 🔝 NAVBAR (same as options.html) */
    .navbar {
        position: fixed;
        top: 0;
        width: 100%;
        height: 50px;
        background-color: rgba(52, 73, 94, 0.9);

        display: flex;
        justify-content: center;
        align-items: center;

        z-index: 1000;
    }

    .navbar a {
        color: white;
        margin: 15px;
        text-decoration: none;
        font-weight: bold;
    }

    .navbar a:hover {
        color: yellow;
    }

    /* 🔥 Logout button (RIGHT SIDE) */
    .logout-btn {
        position: absolute;
        right: 20px;
        top: 15%;
        transform: translateY(-50%);
        background-color: #e74c3c;
        color: white;
        padding: 8px 15px;
        border-radius: 20px;
        text-decoration: none;
        font-weight: bold;
    }

    .logout-btn:hover {
        background-color: #c0392b;
    }

    /* 📦 FORM BOX */
    .box {
        background: rgba(255,255,255,0.95);
        width: 350px;
        margin: 120px auto; /* 👈 below navbar */
        padding: 30px;
        border-radius: 15px;
        box-shadow: 0px 10px 30px rgba(0,0,0,0.3);
    }

    h2 {
        margin-bottom: 20px;
        color: #2c3e50;
        text-align: center;
    }

    label {
        font-weight: bold;
        display: block;
        text-align: left;
        margin-top: 10px;
    }

    input {
        width: 100%;
        padding: 10px;
        margin-top: 5px;
        border-radius: 8px;
        border: 1px solid #ccc;
    }

    input:focus {
        border-color: #3498db;
        outline: none;
    }

    button {
        width: 100%;
        padding: 12px;
        margin-top: 20px;
        border: none;
        border-radius: 10px;
        background-color: #3498db;
        color: white;
        font-weight: bold;
        cursor: pointer;
    }

    button:hover {
        background-color: #2980b9;
    }

    h3 {
        color: green;
        text-align: center;
    }
</style>
</head>

<body>

<!-- 🔝 NAVBAR -->
<div class="navbar">
    <a href="{% url 'doctor_insert' %}">Insert Doctor</a>
    <a href="{% url 'selectpatient1' %}">View Doctor</a>
    <a href="{% url 'inserturl' %}">Add Patient</a>
    <a href="{% url 'selectpatient' %}">View Patient</a>

    <!-- 🔥 Logout -->
    <a href="{% url 'loginurl' %}" class="logout-btn">Logout</a>
</div>

<!-- 📦 FORM -->
<div class="box">
    <h2>Doctor Info</h2>

    <form method="POST">
        {% csrf_token %}

        <label>Doctor ID</label>
        <input type="number" name="did" placeholder="enter doctor id">

        <label>Doctor Name</label>
        <input type="text" name="dname" placeholder="enter doctor name">

        <label>Qualification</label>
        <input type="text" name="dqualification" placeholder="enter qualification">

        <label>Specialization</label>
        <input type="text" name="dspecilization" placeholder="enter specialization">

        <label>Designation</label>
        <input type="text" name="ddesignation" placeholder="enter designation">

        <label>Experience</label>
        <input type="number" name="dexperience" placeholder="enter experience">

        <label>Salary</label>
        <input type="number" name="sal" placeholder="enter salary">

        <button type="submit">Save</button>
    </form>

    <h3>{{ msg }}</h3>
</div>

</body>
</html>
