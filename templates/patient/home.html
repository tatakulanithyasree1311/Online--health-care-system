<!DOCTYPE html>
<html>
<head>
    <title>Patient Info</title>

<style>
    body {
        margin: 0;
        font-family: Arial;
        height: 100vh;

        /* ✅ SAME BACKGROUND */
        background-image: url('https://i.pinimg.com/736x/96/42/75/964275cb1d3387ca39de50cb7a40f230.jpg');
        background-size: cover;
        background-position: center;
        background-repeat: no-repeat;
        background-attachment: fixed;
    }

    /* 🔥 DARK OVERLAY */
    body::before {
        content: "";
        position: fixed;
        width: 100%;
        height: 100%;
        background: rgba(0,0,0,0.4);
        top: 0;
        left: 0;
        z-index: -1;
    }

    /* 🔝 NAVBAR */
    .navbar {
        position: fixed;
        top: 0;
        width: 100%;
        height: 50px;
        background-color: rgba(52, 73, 94, 0.9);

        display: flex;
        justify-content: center;
        align-items: center;

        z-index: 1000;
    }

    .navbar a {
        color: white;
        margin: 15px;
        text-decoration: none;
        font-weight: bold;
    }

    .navbar a:hover {
        color: yellow;
    }

    /* 🔥 LOGOUT BUTTON */
    .logout-btn {
        position: absolute;
        right: 20px;
        top: 15%;
        transform: translateY(-50%);
        background-color: #e74c3c;
        color: white;
        padding: 8px 15px;
        border-radius: 20px;
        text-decoration: none;
        font-weight: bold;
    }

    .logout-btn:hover {
        background-color: #c0392b;
    }

    /* 📦 FORM BOX */
    .box {
        width: 350px;
        margin: 120px auto;
        background: rgba(255,255,255,0.95);
        padding: 25px;
        border-radius: 15px;
        box-shadow: 0px 10px 30px rgba(0,0,0,0.3);
    }

    h2 {
        text-align: center;
        color: #2c3e50;
    }

    label {
        font-weight: bold;
        display: block;
        margin-top: 10px;
    }

    input, select {
        width: 100%;
        padding: 10px;
        margin-top: 8px;
        border-radius: 8px;
        border: 1px solid #ccc;
    }

    input:focus, select:focus {
        border-color: #3498db;
        outline: none;
    }

    button {
        width: 100%;
        padding: 12px;
        margin-top: 20px;
        border: none;
        border-radius: 10px;
        background-color: #3498db;
        color: white;
        font-weight: bold;
        cursor: pointer;
    }

    button:hover {
        background-color: #2980b9;
    }

    h3 {
        text-align: center;
        color: green;
    }
</style>
</head>

<body>

<!-- 🔝 NAVBAR -->
<div class="navbar">
    <a href="{% url 'doctor_insert' %}">Insert Doctor</a>
    <a href="{% url 'selectpatient1' %}">View Doctor</a>
    <a href="{% url 'inserturl' %}">Add Patient</a>
    <a href="{% url 'selectpatient' %}">View Patient</a>

    <!-- 🔥 LOGOUT -->
    <a href="{% url 'loginurl' %}" class="logout-btn">Logout</a>
</div>

<!-- 📦 FORM -->
<div class="box">
    <h2>Patient Info</h2>

    <form method="POST">
        {% csrf_token %}

        <label>Patient ID</label>
        <input type="number" name="pid" placeholder="Enter Patient ID" required>

        <label>Patient Name</label>
        <input type="text" name="pname" placeholder="Enter Name" required>

        <label>Patient Address</label>
        <input type="text" name="paddress" placeholder="Enter Address">

        <label>Patient Phone</label>
        <input type="text" name="pphone" placeholder="Enter Phone">

        <label>Patient Disease</label>
        <select name="pdisease" required>
            <option value="" disabled selected>-- Select Disease --</option>
            <option value="Fever">Fever</option>
            <option value="Cold">Cold</option>
            <option value="Brain Stroke">Brain Stroke</option>
            <option value="Covid">Covid</option>
            <option value="Love Failure">Love Failure</option>
            <option value="Heart Break">Heart Break</option>
        </select>

        <label>Patient Email</label>
        <input type="email" name="pemail" placeholder="Enter Email">

        <label>Doctor Designation</label>
        <input type="text" name="doc_designation" placeholder="Enter doctor designation">

        <label>Result</label>
        <input type="text" name="presult" placeholder="Enter patient result">

        <button type="submit">Submit Details</button>
    </form>

    <h3>{{ msg }}</h3>
</div>

</body>
</html>
