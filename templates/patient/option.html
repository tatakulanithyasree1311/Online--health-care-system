<!DOCTYPE html>
<html>
<head>
    <title>Dashboard</title>

<style>
    body {
        margin: 0;
        font-family: Arial;
        height: 100vh;
        overflow: hidden;

        background-image: url('https://i.pinimg.com/736x/96/42/75/964275cb1d3387ca39de50cb7a40f230.jpg');
        background-size: cover;
        background-position: center;
        background-repeat: no-repeat;
        background-attachment: fixed;
    }

    /* Dark overlay */
    body::before {
        content: "";
        position: fixed;
        width: 100%;
        height: 100%;
        background: rgba(0,0,0,0.4);
        top: 0;
        left: 0;
        z-index: -1;
    }

    /* 🔝 NAVBAR */
    .navbar {
        position: fixed;
        top: 0;
        width: 100%;
        height: 20px;
        padding: 15px;
        background-color: rgba(52, 73, 94, 0.9);
        display: flex;
        text-align: center;
        justify-content: center;
        z-index: 1000;
    }

    .navbar a {
        color: white;
        margin: 15px;
        text-decoration: none;
        font-weight: bold;
    }

    .navbar a:hover {
        color: yellow;
    }

    /* Logout button */
    .logout-btn {
        position: absolute;
        right: 40px;
        top: 10px;
        transform: translateY(-50%);
        background-color: #e74c3c;
        color: white;
        padding: 8px 15px;
        border-radius: 20px;
        text-decoration: none;
        font-weight: bold;
    }

    .logout-btn:hover {
        background-color: #c0392b;
    }

    /* 🎯 CENTER CONTENT FIX (IMPORTANT CHANGE) */
    .welcome {
        position: fixed;   /* 🔥 changed from absolute */
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        color: white;
        text-align: center;
        width: 100%;
        max-width: 700px;
    }

    .welcome h1 {
        font-size: 42px;
        text-shadow: 2px 2px 10px rgba(0,0,0,0.8);
        margin-bottom: 15px;
    }

    .welcome p {
        font-size: 18px;
        line-height: 1.6;
    }

    iframe {
        display: none; /* optional: hides empty space */
    }

</style>
</head>

<body>

<!-- 🔝 NAVBAR -->
<div class="navbar">

    <div class="nav-center">
        <a href="{% url 'doctor_insert' %}">Insert Doctor</a>
        <a href="{% url 'selectpatient1' %}">View Doctor</a>
        <a href="{% url 'inserturl' %}">Add Patient</a>
        <a href="{% url 'selectpatient' %}">View Patient</a>
    </div>

    <a href="{% url 'loginurl' %}" class="logout-btn">Logout</a>

</div>

<!-- 🎯 CENTER CONTENT -->
<div class="welcome">
    <h1>ONLINE HEALTH CARE SYSTEM</h1>
    <p>Your trusted digital platform for managing doctors and patients.</p>
    <p>Streamline medical records, improve efficiency, and deliver better care.</p>
    <p>Simple • Secure • Reliable</p>
</div>

<!-- 🔽 CONTENT -->
<iframe name="frame"></iframe>

</body>
</html>
